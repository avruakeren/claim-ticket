<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Claim Ticket Now!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- PHASE 0: LANDING -->
  <section id="landing" class="screen">
    <div class="landing-card">
      <h1 class="glitch-text">SELAMAT!</h1>
      <p class="landing-sub">Kamu terpilih memenangkan <strong>1x VIP Tiket SEVENTEEN World Tour 2028</strong> di ICE BSD!</p>
      <p id="countdown" class="hint">tiket kedaluwarsa dalam 00:10</p>
      <button id="claimBtn" class="big-btn">KLAIM TIKET SEKARANG</button>
    </div>
  </section>

  <!-- PHASE 1.5: SYSTEM OVERRIDE (fake loading) -->
  <section id="override" class="screen hidden">
    <div class="override-box">
      <p class="override-line">&gt; SYSTEM OVERRIDE IN PROGRESS</p>
      <p class="override-line">&gt; KICKING USER: MINGYU...</p>
      <p class="override-line">&gt; TRANSFERRING CONTROL TO AVRUA...</p>
      <p class="override-pct"><span id="ovPct">0</span>%</p>
    </div>
  </section>

  <!-- PHASE 1-3: VISUAL NOVEL -->
  <section id="game" class="screen hidden">
    <div class="game-frame" id="gameFrame">
      <div class="emoji-circle" id="emojiCircle"><img id="circleImg" class="hidden" src="" alt="" /></div>
      <div class="dialog-box" id="dialogBox">
        <div id="text"></div>
        <div id="indicator">▽</div>
      </div>
      <button id="gateBtn" class="hidden">AMBIL TIKET DISINI!</button>
      <div id="choiceWrap" class="hidden">
        <button id="choiceA" class="choice-btn">alay lu</button>
        <button id="choiceB" class="choice-btn">ga alay kok</button>
      </div>
      <button id="endBtn" class="hidden">?</button>
    </div>
  </section>

  <!-- END: blank page with monkey gif -->
  <section id="end" class="screen hidden">
    <img src="assets/monyet joget.gif" alt="" class="end-gif" />
  </section>

  <!-- YouTube background audio (no visual) -->
  <div id="ytWrap" class="hidden"><div id="ytPlayer"></div></div>

  <!-- Local background music -->
  <audio id="audioMingyu" src="assets/mingyu.mp3" loop preload="auto"></audio>
  <audio id="audioAvrua" src="assets/avrua.mp3" loop preload="auto"></audio>

  <!-- Confetti lib (lightweight) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
